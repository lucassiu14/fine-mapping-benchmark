# Runs `R CMD check` on push / PR to main, reproducing the local
# Status: OK achieved in Phase 3b-iv.
#
# Dependency notes (why this isn't the vanilla r-lib template):
#   - sim1000G (Imports) is archived on CRAN and susieR (Imports) is a
#     GitHub package; both are pinned via the Remotes: field in DESCRIPTION,
#     which setup-r-dependencies (pak) reads.
#   - CARMA (Suggests) is GitHub-only and LinkingTo RcppGSL (needs the GSL
#     system library). It is an optional fine-mapping method whose tests
#     skip when it is absent (skip_if_not_installed("CARMA")), so CI does
#     not install it: `dependencies: "hard"` pulls only Imports/LinkingTo,
#     and the few Suggests actually needed for check/test/vignette are
#     listed explicitly under extra-packages.
#   - _R_CHECK_FORCE_SUGGESTS_=false so the uninstalled Suggests (CARMA,
#     reticulate, yaml) downgrade from an error to a NOTE.
#   - pandoc is provided by setup-pandoc so the HTML vignette builds.
#   - The test suite downloads a ~1 MB HapMap genetic map from GitHub on
#     first use (sim1000G); GitHub Actions runners have network access.

name: R-CMD-check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: read-all

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}
    name: ${{ matrix.config.os }} (${{ matrix.config.r }})
    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: ubuntu-latest,  r: 'release'}
          - {os: macos-latest,   r: 'release'}

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes
      _R_CHECK_FORCE_SUGGESTS_: false

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          # Only hard deps (Imports/LinkingTo) from DESCRIPTION + Remotes;
          # skips the heavy/optional Suggests (notably CARMA + GSL).
          dependencies: '"hard"'
          extra-packages: |
            any::rcmdcheck
            any::testthat
            any::knitr
            any::rmarkdown

      - uses: r-lib/actions/check-r-package@v2
        with:
          args: 'c("--no-manual")'
          error-on: '"warning"'
          upload-snapshots: true
